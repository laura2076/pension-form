<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파트너 정보 수집</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #edf2f7; }
    iframe { display: block; width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>
<iframe id="f" allowfullscreen></iframe>
<div id="err" style="display:none; text-align:center; padding:60px 24px; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; color:#718096; font-size:16px;">
  ⚠️ 잘못된 링크예요.<br><br>담당자에게 올바른 링크를 요청해주세요.
</div>
<script>
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbxvYDjNHgdZkT16Z1UQE8yUxBC2PCchdt-l2_v-PZbl3nUVPTnyriwhxL5CjGKtUVGp_w/exec';
  var id = new URLSearchParams(window.location.search).get('id') || '';
  if (id) {
    document.getElementById('f').src = GAS_URL + '?id=' + id;
  } else {
    document.getElementById('f').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  }
</script>
</body>
</html>
